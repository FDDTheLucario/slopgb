name: CI

on:
  push:
    branches: [main, master]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  ci:
    name: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      # cpal needs the ALSA headers on Linux; gilrs needs libudev.
      - name: Install ALSA + udev development packages (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libudev-dev

      # Pinned — keep in sync with rust-toolchain.toml. Unpinned @stable let a
      # new stable release surface fresh clippy lints in CI that passed locally.
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@1.97.0
        with:
          components: rustfmt, clippy
          # Plugins compile to wasm; the guest SDK + round-trip test need this.
          targets: wasm32-unknown-unknown

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      # Fetch both pinned test-ROM bundles — mooneye mts + the
      # game-boy-test-roms v7.0 collection (sh script; Git Bash on Windows).
      - name: Download test ROMs
        run: bash test-roms/download.sh
        shell: bash

      - name: Format check
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      # The host-target run above does not cross-compile the guest SDK; lint it
      # for the wasm32 target it actually ships to.
      - name: Clippy (wasm plugin SDK)
        run: cargo clippy -p slopgb-plugin-api --target wasm32-unknown-unknown -- -D warnings

      - name: Test
        run: cargo test --workspace
        env:
          # Missing test ROMs must fail loudly here, never skip-to-green.
          SLOPGB_REQUIRE_ROMS: "1"

      - name: Build release binary
        run: cargo build --release -p slopgb
